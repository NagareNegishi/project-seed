version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Granting specific Linux kernel capabilities — required by project-firewall.sh
    cap_add:
      # Grants permission to modify network interfaces and routing rules
      - NET_ADMIN
      # Grants permission to use raw network sockets
      - NET_RAW

    # Uncomment to connect as root instead. More info: https://aka.ms/dev-containers-non-root.
    # user: root

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  # <placeholder> stack services, e.g. a db service (see examples/)

volumes:
  # Fixed name shared by every project built from the seed: one Claude login/config.
  # Reuses the existing volume if present, creates it otherwise.
  claude-credentials:
    name: claude-credentials
  # <placeholder> stack volumes, e.g. db data or dev-cert volumes (see examples/)
